<!DOCTYPE html>
<html lang="en" style="width: 100%; height: 100%;">
<head>
    <meta charset="UTF-8">
    <title>TOP</title>
</head>
<body style="width: 100%; height: 100%;">
<iframe width="80%" height="80%" class="dark" src="index.html?userName=kiwamu">
</iframe>
<br/>
<button id="reload" >reload</button>
<button id="dark" >dark</button>
<button id="light" >light</button>

<script>
    const changeChannel = new BroadcastChannel("soft-prac-report-change")
    const darkModeChannel = new BroadcastChannel("soft-prac-dark-mode")

    const reloadButton = document.getElementById("reload")
    const darkButton = document.getElementById("dark")
    const lightButton = document.getElementById("light")

    reloadButton.onclick = () => { changeChannel.postMessage("change")}
    darkButton.onclick = () => {darkModeChannel.postMessage("dark")}
    lightButton.onclick = () => {darkModeChannel.postMessage("light")}

</script>
</body>
</html>
